<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBook - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a26;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-muted: #8888a0;
            --accent: #22d68a;
            --accent-dim: #1a9e66;
            --accent-glow: rgba(34, 214, 138, 0.15);
            --red: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 0 24px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 48px;
            text-decoration: none;
            color: var(--text);
        }

        .logo-mark {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 26px;
            color: var(--bg);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 36px;
        }

        .auth-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .auth-btn:hover {
            background: var(--accent-dim);
            transform: translateY(-1px);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-switch {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .auth-switch a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .auth-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--red);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .auth-error.visible {
            display: block;
        }

        .password-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            opacity: 0.7;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--bg);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            position: absolute;
            top: 24px;
            left: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text);
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6"/>
        </svg>
        Back
    </a>

    <div class="auth-container">
        <a href="/" class="auth-logo">
            <div class="logo-mark">D</div>
            <span class="logo-text">DevBook</span>
        </a>

        <div class="auth-card">
            <h1 class="auth-title" id="auth-title">Sign in to DevBook</h1>
            <p class="auth-subtitle" id="auth-subtitle">Welcome back. Enter your credentials to continue.</p>

            <div class="auth-error" id="auth-error"></div>

            <form id="auth-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email" autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                    <div class="password-hint" id="password-hint" style="display:none">Minimum 8 characters</div>
                </div>

                <button type="submit" class="auth-btn" id="auth-btn">Sign In</button>
            </form>

            <div class="auth-switch">
                <span id="switch-text">Don't have an account?</span>
                <a id="switch-link" onclick="toggleMode()">Create one</a>
            </div>
        </div>
    </div>

    <script>
        let isSignup = false;

        // If already logged in, redirect to app
        if (localStorage.getItem('devbook_token')) {
            window.location.href = '/app';
        }

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const btn = document.getElementById('auth-btn');
            const switchText = document.getElementById('switch-text');
            const switchLink = document.getElementById('switch-link');
            const passwordHint = document.getElementById('password-hint');
            const passwordInput = document.getElementById('password');

            hideError();

            if (isSignup) {
                title.textContent = 'Create your account';
                subtitle.textContent = 'Start building and saving API requests in DevBook.';
                btn.textContent = 'Create Account';
                switchText.textContent = 'Already have an account?';
                switchLink.textContent = 'Sign in';
                passwordHint.style.display = 'block';
                passwordInput.autocomplete = 'new-password';
            } else {
                title.textContent = 'Sign in to DevBook';
                subtitle.textContent = 'Welcome back. Enter your credentials to continue.';
                btn.textContent = 'Sign In';
                switchText.textContent = "Don't have an account?";
                switchLink.textContent = 'Create one';
                passwordHint.style.display = 'none';
                passwordInput.autocomplete = 'current-password';
            }
        }

        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('auth-error').classList.remove('visible');
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('auth-btn');

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (isSignup && password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }

            const endpoint = isSignup ? '/auth/signup' : '/auth/login';
            const btnText = btn.textContent;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>' + (isSignup ? 'Creating account...' : 'Signing in...');

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Something went wrong');
                    btn.disabled = false;
                    btn.textContent = btnText;
                    return;
                }

                // Store token and user info
                localStorage.setItem('devbook_token', data.token);
                localStorage.setItem('devbook_user', JSON.stringify(data.user));

                // Redirect to app
                window.location.href = '/app';
            } catch (err) {
                showError('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = btnText;
            }
        });

        // Check URL params for mode
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'signup') {
            toggleMode();
        }
    </script>

    <!-- Newo AI Chatbot -->
    <script defer src="https://static.newo.ai/newo-chat/web-chat.js" name="web-chat" data-client-secret="f8c07531-a735-4c35-ae02-77018e0471fb"></script>
</body>
</html>
